<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .header {
      background: #1a73e8;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .count { font-size: 12px; background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 10px; }
    .sniffer-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
    }
    .sniffer-toggle .switch {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }
    .sniffer-toggle .switch input { display: none; }
    .sniffer-toggle .switch .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 10px;
      transition: 0.2s;
    }
    .sniffer-toggle .switch .slider::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .sniffer-toggle .switch input:checked + .slider { background: #1a73e8; }
    .sniffer-toggle .switch input:checked + .slider::after { transform: translateX(16px); }
    .actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .btn {
      padding: 6px 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      background: #fff;
      transition: all 0.15s;
    }
    .btn:hover { background: #f0f0f0; }
    .btn-primary {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .btn-primary:hover { background: #1557b0; }
    .list {
      max-height: 320px;
      overflow-y: auto;
    }
    .item {
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.1s;
    }
    .item:hover { background: #f8f9fa; }
    .item .url {
      font-size: 12px;
      color: #1a73e8;
      word-break: break-all;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .item .meta {
      font-size: 11px;
      color: #999;
      display: flex;
      gap: 12px;
    }
    .item-actions {
      margin-top: 6px;
      display: flex;
      gap: 6px;
    }
    .item-actions .btn { font-size: 11px; padding: 3px 10px; }
    .empty {
      padding: 40px 16px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }
    .empty .icon { font-size: 32px; margin-bottom: 8px; }
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>M3U8 嗅探器</h1>
    <span class="count" id="count">0</span>
  </div>
  <div class="sniffer-toggle">
    <label class="switch">
      <input type="checkbox" id="snifferToggle" checked>
      <span class="slider"></span>
    </label>
    <span id="snifferLabel">嗅探已开启</span>
  </div>
  <div class="actions">
    <button class="btn btn-primary" id="openManager">下载管理器</button>
    <button class="btn" id="clearBtn">清空列表</button>
    <button class="btn" id="refreshBtn">刷新</button>
  </div>
  <div class="list" id="list">
    <div class="empty">
      <div class="icon">📡</div>
      <div>等待检测到 m3u8 资源...</div>
      <div style="margin-top:4px;font-size:11px">浏览视频页面即可自动嗅探</div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
